<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMW — Liens</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #1a0533 0%, #3b1278 50%, #200a4a 100%);
  display: flex; flex-direction: column; align-items: center;
  padding: 2.5rem 1.25rem 2rem;
  font-family: 'Outfit', sans-serif;
}
.avatar {
  width: 96px; height: 96px; border-radius: 50%;
  border: 3px solid rgba(200,130,255,0.6);
  object-fit: cover; margin-bottom: 1rem;
  box-shadow: 0 0 0 6px rgba(180,100,255,0.15);
}
.brand-name { font-size: 1.6rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; margin: 0 0 0.25rem; text-align: center; }
.brand-tag { font-size: 0.95rem; font-weight: 600; color: #c97eff; margin: 0 0 0.3rem; text-align: center; }
.brand-sub { font-size: 0.85rem; color: rgba(255,255,255,0.45); margin: 0 0 2rem; text-align: center; }
.links { display: flex; flex-direction: column; gap: 0.85rem; width: 100%; max-width: 360px; }
.lk-btn {
  display: flex; align-items: center; justify-content: center; gap: 0.6rem;
  padding: 1rem 1.25rem; border-radius: 14px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(200,130,255,0.2);
  color: #fff; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 600;
  text-decoration: none; transition: background 0.2s, border-color 0.2s, transform 0.15s;
}
.lk-btn:hover { background: rgba(200,130,255,0.12); border-color: rgba(200,130,255,0.5); transform: translateY(-2px); }
.lk-btn:active { transform: scale(0.98); }
.lk-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
.footer { margin-top: 2.2rem; display: flex; flex-direction: column; align-items: center; gap: 0.9rem; }
.footer-icons { display: flex; gap: 1.5rem; opacity: 0.35; align-items: center; }
.footer-icons svg { width: 20px; height: 20px; fill: white; }
.footer-text { font-size: 0.75rem; color: rgba(255,255,255,0.3); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
</style>
